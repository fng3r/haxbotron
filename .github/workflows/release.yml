name: Verify and package release

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22.20
        uses: actions/setup-node@v4
        with:
          node-version: 22.20.0
          cache: npm
          cache-dependency-path: |
            core/package-lock.json
            db/package-lock.json
            web/package-lock.json

      - name: Install core dependencies
        run: npm ci
        working-directory: core

      - name: Test core
        run: npm test -- --runInBand
        working-directory: core

      - name: Build core
        run: npm run build
        working-directory: core

      - name: Install database dependencies
        run: npm ci
        working-directory: db

      - name: Build database service
        run: npm run build
        working-directory: db

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: Build web application
        run: npm run build
        working-directory: web

      - name: Package build outputs
        if: startsWith(github.ref, 'refs/tags/v')
        run: zip -r build-outputs.zip core/out db/out web/.next

      - name: Upload build artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: build-outputs
          path: build-outputs.zip
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-outputs

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" build-outputs.zip --draft --generate-notes --title "${GITHUB_REF_NAME}"
