name: Build and test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [core, db, web]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22.20
        uses: actions/setup-node@v4
        with:
          node-version: 22.20.0
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.app }}

      - name: Build
        run: npm run build
        working-directory: ${{ matrix.app }}

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: core
            command: npm test -- --runInBand

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22.20
        uses: actions/setup-node@v4
        with:
          node-version: 22.20.0
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.app }}

      - name: Test
        run: ${{ matrix.command }}
        working-directory: ${{ matrix.app }}
